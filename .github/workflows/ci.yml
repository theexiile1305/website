name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - run: corepack enable
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.14.0
          cache: pnpm
      - run: corepack prepare pnpm@10.32.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6.0.2
      - run: corepack enable
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.14.0
          cache: pnpm
      - run: corepack prepare pnpm@10.32.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
